name: Build and deploy to bb-aktion-landingpages

# Wir deployen den gebauten Output als Subpfad /aktion/1 ins existierende
# Hosting-Repo (BerkanCeyhan/bb-aktion-landingpages, branch gh-pages).
# Dort liegt CNAME = try.brustbizeps.de und mehrere Aktion-Pages parallel.
#
# Voraussetzung: Repository secret BB_AKTION_DEPLOY_PAT (Personal Access Token
# mit `repo` scope auf bb-aktion-landingpages).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-aktion-1
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Checkout target repo (gh-pages)
        uses: actions/checkout@v4
        with:
          repository: BerkanCeyhan/bb-aktion-landingpages
          ref: gh-pages
          token: ${{ secrets.BB_AKTION_DEPLOY_PAT }}
          path: target

      - name: Replace aktion/1 with fresh build
        run: |
          rm -rf target/aktion/1
          mkdir -p target/aktion/1
          cp -r dist/* target/aktion/1/

      - name: Commit and push
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aktion/1
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "Deploy aktion/1 from ${GITHUB_SHA::7}"
          git push
